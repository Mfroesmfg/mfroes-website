# ============================================================
#  MFroes admin panel configuration (Sveltia CMS)
#  --> Change ONE thing before deploying: the "repo:" line below.
#      Set it to  your-github-username/mfroes-website
# ============================================================

backend:
  name: github
  repo: Mfroesmfg/mfroes-website
  branch: main

# Photos you upload in the admin are saved here:
media_folder: "images"
public_folder: "/images"

collections:
  - name: content
    label: "Website Content"
    files:

      # ---------- Used & Refurbished ----------
      - name: used
        label: "Used & Refurbished Machines"
        file: "content/used.json"
        icon: build
        fields:
          - name: items
            label: "Machines"
            label_singular: "Machine"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: "Name", widget: string }
              - { name: desc, label: "Description", widget: text }
              - name: status
                label: "Status"
                widget: select
                options: ["available", "pending", "sold"]
                default: "available"
              - name: imgs
                label: "Photos"
                label_singular: "Photo"
                widget: list
                field: { name: image, label: "Photo", widget: image }

      # ---------- Videos ----------
      - name: videos
        label: "Videos"
        file: "content/videos.json"
        fields:
          - name: items
            label: "Videos"
            label_singular: "Video"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: "Caption", widget: string }
              - { name: url, label: "YouTube link", widget: string }

      # ---------- Plants & Projects (bilingual) ----------
      - name: plants
        label: "Plants & Projects"
        file: "content/plants.json"
        fields:
          - name: items
            label: "Projects"
            label_singular: "Project"
            widget: list
            summary: "{{fields.title.en}}"
            fields:
              - name: title
                label: "Name"
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: es, label: "Spanish", widget: string }
              - name: location
                label: "Location"
                widget: object
                fields:
                  - { name: en, label: "English", widget: string, required: false }
                  - { name: es, label: "Spanish", widget: string, required: false }
              - name: role
                label: "Role tag (e.g. Designed & Built)"
                widget: object
                fields:
                  - { name: en, label: "English", widget: string, required: false }
                  - { name: es, label: "Spanish", widget: string, required: false }
              - name: desc
                label: "Description"
                widget: object
                fields:
                  - { name: en, label: "English", widget: text }
                  - { name: es, label: "Spanish", widget: text }
              - name: imgs
                label: "Photos"
                label_singular: "Photo"
                widget: list
                field: { name: image, label: "Photo", widget: image }

      # ---------- Our Story photos (bilingual caption) ----------
      - name: story
        label: "Our Story Photos"
        file: "content/story.json"
        fields:
          - name: items
            label: "Photos"
            label_singular: "Photo"
            widget: list
            summary: "{{fields.cap.en}}"
            fields:
              - { name: img, label: "Photo", widget: image }
              - name: cap
                label: "Caption"
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: es, label: "Spanish", widget: string }

      # ---------- Crops we clean (bilingual) ----------
      - name: crops
        label: "Crops We Clean"
        file: "content/crops.json"
        fields:
          - name: items
            label: "Crops"
            label_singular: "Crop"
            widget: list
            summary: "{{fields.en}}"
            fields:
              - { name: en, label: "English", widget: string }
              - { name: es, label: "Spanish", widget: string }

      # ---------- Brands we distribute (Spanish page only) ----------
      - name: brands
        label: "Brands We Distribute (Spanish page)"
        file: "content/brands.json"
        icon: sell
        fields:
          - name: items
            label: "Brands"
            label_singular: "Brand"
            widget: list
            summary: "{{fields.es}}"
            fields:
              - { name: es, label: "Brand line — Spanish (this is what shows on the site)", widget: string }
              - { name: en, label: "English version (optional)", widget: string, required: false }

      # ---------- New Equipment catalog (models, photos, key info) ----------
      - name: catalog
        label: "New Equipment (models & photos)"
        file: "content/catalog.json"
        icon: build
        fields:
          - name: models
            label: "Equipment models"
            label_singular: "Model"
            widget: list
            summary: "{{fields.name}}  —  {{fields.category}}"
            fields:
              - name: category
                label: "Category (which section it shows in)"
                widget: select
                options:
                  - { label: "Seed Cleaners", value: "seed-cleaners" }
                  - { label: "Destoners", value: "destoners" }
                  - { label: "Bucket Elevators", value: "bucket-elevators" }
                  - { label: "Belt Conveyors", value: "belt-conveyors" }
                  - { label: "Magnetic Belt Conveyor", value: "magnetic-belt" }
                  - { label: "Polishers", value: "polishers" }
              - { name: name, label: "Model name", widget: string }
              - name: photos
                label: "Photos (the first one is the main photo)"
                label_singular: "Photo"
                widget: list
                field: { name: image, label: "Photo", widget: image }
              - { name: cap, label: "Capacity (e.g. 10 t/h)", widget: string, required: false }
              - { name: screens, label: "Number of screens (optional)", widget: string, required: false }
              - { name: size, label: "Screen size (optional)", widget: string, required: false }
              - name: series
                label: "Series line (optional, e.g. GenX Series)"
                widget: object
                required: false
                fields:
                  - { name: en, label: "English", widget: string, required: false }
                  - { name: es, label: "Spanish", widget: string, required: false }
              - name: desc
                label: "Description"
                widget: object
                fields:
                  - { name: en, label: "English", widget: text, required: false }
                  - { name: es, label: "Spanish", widget: text, required: false }
              - { name: pdf, label: "Spec sheet PDF (optional)", widget: file, required: false }
              - name: specs
                label: "Spec table (Capacity, Screens, Motors, Air…)"
                label_singular: "Spec group"
                widget: list
                required: false
                collapsed: true
                summary: "{{fields.group.en}}"
                fields:
                  - name: group
                    label: "Group heading (leave blank for no heading)"
                    widget: object
                    required: false
                    fields:
                      - { name: en, label: "English", widget: string, required: false }
                      - { name: es, label: "Spanish", widget: string, required: false }
                  - name: rows
                    label: "Rows"
                    label_singular: "Row"
                    widget: list
                    required: false
                    summary: "{{fields.label.en}}: {{fields.value.en}}"
                    fields:
                      - name: label
                        label: "Label (left column)"
                        widget: object
                        fields:
                          - { name: en, label: "English", widget: string, required: false }
                          - { name: es, label: "Spanish", widget: string, required: false }
                      - name: value
                        label: "Value (right column)"
                        widget: object
                        fields:
                          - { name: en, label: "English", widget: string, required: false }
                          - { name: es, label: "Spanish", widget: string, required: false }
              - name: features
                label: "Standard Features"
                label_singular: "Feature"
                widget: list
                required: false
                collapsed: true
                summary: "{{fields.en}}"
                fields:
                  - { name: en, label: "English", widget: string, required: false }
                  - { name: es, label: "Spanish", widget: string, required: false }
              - name: options
                label: "Options"
                label_singular: "Option"
                widget: list
                required: false
                collapsed: true
                summary: "{{fields.en}}"
                fields:
                  - { name: en, label: "English", widget: string, required: false }
                  - { name: es, label: "Spanish", widget: string, required: false }
              - { name: id, label: "Internal ID — leave blank when adding a new model; do not change on existing ones", widget: string, required: false }

      # ---------- Home page category card photos ----------
      - name: hometiles
        label: "Home Page Card Photos"
        file: "content/home-tiles.json"
        icon: image
        fields:
          - { name: seed-cleaners, label: "Seed Cleaners card photo", widget: image, required: false }
          - { name: destoners, label: "Destoners card photo", widget: image, required: false }
          - { name: bucket-elevators, label: "Bucket Elevators card photo", widget: image, required: false }
          - { name: belt-conveyors, label: "Belt Conveyors card photo", widget: image, required: false }
          - { name: magnetic-belt, label: "Magnetic Belt Conveyor card photo", widget: image, required: false }
          - { name: polishers, label: "Polishers card photo", widget: image, required: false }
          - { name: used-equipment, label: "Used & Refurbished card photo", widget: image, required: false }
